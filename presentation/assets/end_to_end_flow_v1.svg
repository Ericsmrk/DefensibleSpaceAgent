<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #e6edf3; }
      .muted { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .box { fill: #0d1117; stroke: #334155; stroke-width: 2; rx: 14; }
      .box2 { fill: #0f1b2d; stroke: #2a3a55; stroke-width: 2; rx: 14; }
      .h { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #e6edf3; }
      .t { font: 400 17px "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .tag { fill: #f97316; opacity: 0.18; stroke: #f97316; stroke-width: 2; rx: 999; }
      .tagText { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #fdba74; letter-spacing: 1px; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#m); }
      .arrowO { stroke: #f97316; stroke-width: 3; fill: none; marker-end: url(#mO); }
      .note { font: 400 14px "Segoe UI", Arial, sans-serif; fill: #a3b4cc; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#94a3b8"/>
    </marker>
    <marker id="mO" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="78">End-to-End Flow (v1)  request lifecycle</text>
  <text class="muted" x="70" y="112">Primary runtime path: POST /api/assess ’ src.agent.run_agent ’ tier-specific execution ’ structured JSON response</text>

  <!-- Top row -->
  <rect class="box2" x="70" y="160" width="320" height="110" rx="14"/>
  <rect class="tag" x="92" y="182" width="140" height="28" rx="999"/>
  <text class="tagText" x="105" y="202">INPUT</text>
  <text class="h" x="92" y="236">User request</text>
  <text class="t" x="92" y="260">address + (optional) coords + tier</text>

  <rect class="box" x="430" y="160" width="340" height="110" rx="14"/>
  <rect class="tag" x="452" y="182" width="190" height="28" rx="999"/>
  <text class="tagText" x="465" y="202">PLANNER (LLM)</text>
  <text class="h" x="452" y="236">Execution spec JSON</text>
  <text class="t" x="452" y="260">request_type + steps + constraints</text>

  <rect class="box" x="810" y="160" width="360" height="110" rx="14"/>
  <rect class="tag" x="832" y="182" width="210" height="28" rx="999"/>
  <text class="tagText" x="845" y="202">VALIDATION</text>
  <text class="h" x="832" y="236">Normalize + validate plan</text>
  <text class="t" x="832" y="260">whitelist, ordering, tier rules</text>

  <rect class="box" x="1210" y="160" width="320" height="110" rx="14"/>
  <rect class="tag" x="1232" y="182" width="210" height="28" rx="999"/>
  <text class="tagText" x="1245" y="202">TOOL ARGS</text>
  <text class="h" x="1232" y="236">Derive + validate args</text>
  <text class="t" x="1232" y="260">buffer/date/cloud + address</text>

  <!-- Arrows top row -->
  <path class="arrow" d="M390 215 L430 215"/>
  <path class="arrow" d="M770 215 L810 215"/>
  <path class="arrow" d="M1170 215 L1210 215"/>

  <!-- Tier split -->
  <text class="muted" x="70" y="328">Tier split (request_type)</text>

  <rect class="box2" x="70" y="360" width="720" height="260" rx="18"/>
  <rect class="tag" x="96" y="386" width="240" height="28" rx="999"/>
  <text class="tagText" x="109" y="406">BASELINE (FREE TIER)</text>
  <text class="h" x="96" y="446">Baseline executor + tool registry</text>
  <text class="t" x="96" y="474">resolve_location ’ validate_CA ’ hazard/terrain/veg</text>
  <text class="t" x="96" y="502">generate_baseline_report (LLM JSON synthesis + fallback)</text>
  <text class="note" x="96" y="538">Output: baseline_workflow.final_report (structured sections) + plaintext summary</text>

  <!-- Baseline internal boxes -->
  <rect class="box" x="96" y="560" width="210" height="44" rx="12"/>
  <text class="t" x="110" y="588">Tools (registry)</text>
  <rect class="box" x="320" y="560" width="220" height="44" rx="12"/>
  <text class="t" x="334" y="588">Structured ToolResult</text>
  <rect class="box" x="560" y="560" width="200" height="44" rx="12"/>
  <text class="t" x="574" y="588">Baseline report JSON</text>

  <path class="arrow" d="M306 582 L320 582"/>
  <path class="arrow" d="M540 582 L560 582"/>

  <rect class="box2" x="830" y="360" width="700" height="260" rx="18"/>
  <rect class="tag" x="856" y="386" width="220" height="28" rx="999"/>
  <text class="tagText" x="869" y="406">FULL (PAID TIER)</text>
  <text class="h" x="856" y="446">Step loop execution + recommendations</text>
  <text class="t" x="856" y="474">resolve_location (if needed) ’ validate_CA ’ hazard/terrain/veg</text>
  <text class="t" x="856" y="502">NDVI (Earth Engine, optional) ’ fuel class</text>
  <text class="t" x="856" y="530">placeholders: slope / proximity / photo-analysis</text>
  <text class="t" x="856" y="558">CAL FIRE recommendations (LLM JSON) ’ final narrative (LLM text)</text>
  <text class="note" x="856" y="594">Budget-aware: some LLM/tool steps may be skipped under time constraints</text>

  <!-- Tier arrows from tool args -->
  <path class="arrowO" d="M1370 270 C 1370 320, 430 320, 430 360"/>
  <path class="arrowO" d="M1370 270 C 1370 320, 1180 320, 1180 360"/>

  <!-- Output -->
  <rect class="box" x="70" y="670" width="1460" height="160" rx="18"/>
  <rect class="tag" x="96" y="694" width="170" height="28" rx="999"/>
  <text class="tagText" x="109" y="714">OUTPUT</text>
  <text class="h" x="96" y="754">Structured JSON response</text>
  <text class="t" x="96" y="784">plan " tool_args " validation " execution " final_response</text>
  <text class="t" x="96" y="812">+ baseline_workflow (Baseline only) with step-by-step tool outputs and a structured Baseline report</text>

  <!-- Arrows to output -->
  <path class="arrow" d="M430 620 C 430 645, 430 655, 430 670"/>
  <path class="arrow" d="M1180 620 C 1180 645, 1180 655, 1180 670"/>
</svg>

