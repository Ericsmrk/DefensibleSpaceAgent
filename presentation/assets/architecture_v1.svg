<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #0f1b2d; stroke: #2a3a55; stroke-width: 2; rx: 18; }
      .box { fill: #0d1117; stroke: #334155; stroke-width: 2; rx: 14; }
      .box2 { fill: #0b1020; stroke: #334155; stroke-width: 2; rx: 14; }
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #e6edf3; }
      .h { font: 700 22px "Segoe UI", Arial, sans-serif; fill: #e6edf3; }
      .t { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #cbd5e1; }
      .muted { font: 400 16px "Segoe UI", Arial, sans-serif; fill: #94a3b8; }
      .badge { fill: #f97316; opacity: 0.18; stroke: #f97316; stroke-width: 2; rx: 999; }
      .badgeText { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #fdba74; letter-spacing: 1px; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#m); }
      .arrow2 { stroke: #f97316; stroke-width: 3; fill: none; marker-end: url(#m2); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#94a3b8"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="70" y="78">Agent Architecture (v1)  modules and responsibilities</text>
  <text class="muted" x="70" y="112">Verified against: web_app.py, src/agent.py, src/baseline_executor.py, src/baseline_tools.py, src/tools.py, src/validators.py</text>

  <!-- Left: UI / API -->
  <rect class="panel" x="70" y="150" width="460" height="680" rx="18"/>
  <rect class="badge" x="95" y="175" width="210" height="34" rx="999"/>
  <text class="badgeText" x="112" y="198">WEB UI + API</text>

  <rect class="box" x="95" y="230" width="410" height="210" rx="14"/>
  <text class="h" x="120" y="270">Flask app</text>
  <text class="t" x="120" y="302">web_app.py</text>
  <text class="muted" x="120" y="340">Routes:</text>
  <text class="t" x="120" y="372">/api/plan, /api/assess, /api/geocode</text>
  <text class="t" x="120" y="404">/api/joke, /healthz, /version</text>

  <rect class="box2" x="95" y="470" width="410" height="170" rx="14"/>
  <text class="h" x="120" y="510">Planner-only UI path</text>
  <text class="t" x="120" y="542">Run planner ’ POST /api/plan</text>
  <text class="muted" x="120" y="572">Uses:</text>
  <text class="t" x="120" y="602">src.agent.run_planner_only(...)</text>
  <text class="muted" x="120" y="632">Note:</text>
  <text class="t" x="120" y="662">UI has separate text prompt (web_app.py)</text>

  <rect class="box2" x="95" y="670" width="410" height="135" rx="14"/>
  <text class="h" x="120" y="710">Assessment path</text>
  <text class="t" x="120" y="742">Analyze Fire Risk ’ POST /api/assess</text>
  <text class="t" x="120" y="772">Calls: src.agent.run_agent(...)</text>

  <!-- Center: Agent core -->
  <rect class="panel" x="570" y="150" width="480" height="680" rx="18"/>
  <rect class="badge" x="595" y="175" width="260" height="34" rx="999"/>
  <text class="badgeText" x="612" y="198">STRUCTURED AGENT CORE</text>

  <rect class="box" x="595" y="230" width="430" height="210" rx="14"/>
  <text class="h" x="620" y="270">Orchestration</text>
  <text class="t" x="620" y="302">src/agent.py</text>
  <text class="t" x="620" y="340">Planner ’ normalize/validate ’ tier split</text>
  <text class="t" x="620" y="372">Baseline executor OR Full executor</text>
  <text class="t" x="620" y="404">Structured response: plan/tool_args/validation/execution</text>

  <rect class="box2" x="595" y="470" width="430" height="170" rx="14"/>
  <text class="h" x="620" y="510">Validation layer</text>
  <text class="t" x="620" y="542">src/validators.py</text>
  <text class="t" x="620" y="574">Whitelisted tools + tier rules + ranges</text>
  <text class="t" x="620" y="606">Blocks requests with reasons (no tool execution)</text>

  <rect class="box2" x="595" y="670" width="430" height="135" rx="14"/>
  <text class="h" x="620" y="710">LLM client</text>
  <text class="t" x="620" y="742">src/llm_client.py</text>
  <text class="t" x="620" y="772">chat_json + chat_text with fallbacks</text>

  <!-- Right: Tools + Baseline executor -->
  <rect class="panel" x="1090" y="150" width="440" height="680" rx="18"/>
  <rect class="badge" x="1115" y="175" width="280" height="34" rx="999"/>
  <text class="badgeText" x="1132" y="198">TOOLS + EXECUTORS</text>

  <rect class="box" x="1115" y="230" width="390" height="170" rx="14"/>
  <text class="h" x="1140" y="270">External tools</text>
  <text class="t" x="1140" y="302">src/tools.py</text>
  <text class="t" x="1140" y="340">Google Geocoding ’ coords + admin metadata</text>
  <text class="t" x="1140" y="372">Earth Engine NDVI (Sentinel2) + thumb_url</text>

  <rect class="box2" x="1115" y="430" width="390" height="190" rx="14"/>
  <text class="h" x="1140" y="470">Baseline tier executor</text>
  <text class="t" x="1140" y="502">src/baseline_executor.py</text>
  <text class="muted" x="1140" y="532">Uses tool registry:</text>
  <text class="t" x="1140" y="562">src/baseline_tools.py (TOOL_REGISTRY)</text>
  <text class="t" x="1140" y="592">Synthesis: BASELINE report JSON (LLM or fallback)</text>

  <rect class="box2" x="1115" y="650" width="390" height="155" rx="14"/>
  <text class="h" x="1140" y="690">Full tier execution</text>
  <text class="t" x="1140" y="722">Inside src/agent.py (step loop)</text>
  <text class="t" x="1140" y="754">NDVI/fuel + placeholders + CAL FIRE recommendations</text>

  <!-- Arrows -->
  <path class="arrow" d="M510 340 C 545 340, 555 340, 585 340"/>
  <path class="arrow" d="M510 740 C 545 740, 555 740, 585 740"/>

  <path class="arrow" d="M1035 320 C 1065 320, 1080 320, 1110 320"/>
  <path class="arrow" d="M1035 565 C 1065 565, 1080 565, 1110 565"/>

  <!-- Emphasize tier split -->
  <path class="arrow2" d="M820 455 C 820 480, 820 500, 820 520"/>
  <text class="muted" x="770" y="458">Tier split</text>

  <!-- Footer -->
  <text class="muted" x="70" y="868">v1 emphasizes: explicit plan/validation objects, California-only checks, and graceful degradation when tools are unavailable.</text>
</svg>

